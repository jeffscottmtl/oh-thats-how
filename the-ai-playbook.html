<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The AI Playbook — CN Communications</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CN AI Playbook — shared styles
   ============================================================ */

:root {
  --ink: #1a1a1a;
  --ink-2: #2c2c2c;
  --ink-soft: #5a5a5a;
  --rule: #1a1a1a;
  --paper: #f6f3ec;
  --paper-2: #ebe5d5;
  --card: #ffffff;
  --cn-red: #c8102e;
  --cn-red-deep: #9a0c24;
  --signal: #c8102e;
  --signal-deep: #9a0c24;
  --navy: #1e3a5f;
  --sage: #c8d3b8;
  --sage-deep: #6b7a5a;
  --warn: #d4a017;
  --danger: #b33a2b;

  --serif: "Newsreader", "Source Serif Pro", Georgia, serif;
  --sans: "Instrument Sans", "Söhne", -apple-system, sans-serif;
  --mono: "JetBrains Mono", ui-monospace, Menlo, monospace;

  --r-sm: 2px;
  --r-md: 4px;
  --r-lg: 8px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0; padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: inherit; }

.display { font-family: var(--serif); font-weight: 400; letter-spacing: -0.02em; line-height: 1; font-optical-sizing: auto; }
.display-italic { font-family: var(--serif); font-style: italic; font-weight: 400; letter-spacing: -0.015em; }

.eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); font-weight: 500; }
.label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; }

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 36px;
  border-bottom: 1px solid var(--ink);
  background: var(--paper);
  position: sticky; top: 0; z-index: 10;
  backdrop-filter: blur(8px);
}
.topbar .brand { display: flex; align-items: center; gap: 14px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }

.cn-mark {
  display: inline-flex; align-items: center; gap: 0;
  font-family: "Arial Black", "Helvetica Neue", sans-serif;
  font-weight: 900;
  letter-spacing: -0.02em;
}
.cn-mark .c { background: var(--cn-red); color: white; padding: 4px 7px 4px 7px; font-size: 14px; line-height: 1; border-radius: 2px; }

.topbar nav { display: flex; gap: 26px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
.topbar nav a { text-decoration: none; color: var(--ink); padding-bottom: 2px; border-bottom: 1px solid transparent; }
.topbar nav a:hover { border-bottom-color: var(--cn-red); }

.hr { height: 1px; background: var(--ink); border: 0; margin: 0; }
.hr-soft { height: 1px; background: color-mix(in srgb, var(--ink) 20%, transparent); border: 0; margin: 0; }

.card { background: var(--card); border: 1px solid var(--ink); border-radius: var(--r-md); padding: 24px; }

.callout { border: 1px solid var(--ink); padding: 18px 20px; border-radius: var(--r-md); background: var(--sage); }
.callout.warn { background: #f5e3b8; }
.callout.danger { background: #f3d7cf; }
.callout.info { background: var(--paper-2); }
.callout .label { display: block; margin-bottom: 6px; }
.callout p { margin: 0; font-size: 14px; line-height: 1.5; }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  border: 1px solid var(--ink);
  background: var(--ink); color: var(--paper);
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  cursor: pointer; text-decoration: none;
  border-radius: var(--r-sm);
  transition: all .15s ease;
}
.btn:hover { background: var(--cn-red); border-color: var(--cn-red); }
.btn.ghost { background: transparent; color: var(--ink); }
.btn.ghost:hover { background: var(--ink); color: var(--paper); }

.prompt {
  position: relative;
  background: #141414; color: #f3ece0;
  border-radius: var(--r-md);
  padding: 20px 22px;
  font-family: var(--mono); font-size: 13px; line-height: 1.65;
  white-space: pre-wrap;
}
.prompt .copy-btn {
  position: absolute; top: 10px; right: 10px;
  background: rgba(255,255,255,0.08); color: #f3ece0;
  border: 1px solid rgba(255,255,255,0.2);
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; border-radius: 2px; cursor: pointer;
}
.prompt .copy-btn:hover { background: var(--cn-red); border-color: var(--cn-red); }
.prompt .var { color: var(--cn-red); font-style: italic; }
.prompt .comment { color: #8a8577; }

.ba { display: grid; grid-template-columns: 1fr 1fr; gap: 0; border: 1px solid var(--ink); border-radius: var(--r-md); overflow: hidden; background: var(--card); }
.ba > div { padding: 18px 20px; }
.ba > div + div { border-left: 1px solid var(--ink); }
.ba .hd { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 10px; }
.ba .bad .hd { color: var(--danger); }
.ba .good .hd { color: var(--sage-deep); }
.ba p { margin: 0 0 8px 0; font-size: 14px; line-height: 1.5; }

.check { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
.check li { display: grid; grid-template-columns: 22px 1fr; gap: 10px; align-items: start; font-size: 14px; line-height: 1.45; }
.check li::before { content: ""; width: 16px; height: 16px; border: 1.5px solid var(--ink); border-radius: 2px; margin-top: 3px; }

.steps { counter-reset: step; list-style: none; padding: 0; margin: 0; display: grid; gap: 22px; }
.steps > li { counter-increment: step; display: grid; grid-template-columns: 44px 1fr; gap: 20px; }
.steps > li::before { content: counter(step, decimal-leading-zero); font-family: var(--serif); font-size: 34px; line-height: 0.9; color: var(--cn-red); font-style: italic; }
.steps h4 { margin: 0 0 6px 0; font-family: var(--serif); font-size: 22px; font-weight: 400; letter-spacing: -0.01em; }
.steps p { margin: 0 0 10px 0; font-size: 14.5px; line-height: 1.55; color: var(--ink-2); }

.tag { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--ink); border-radius: 2px; background: var(--paper); }
.tag.signal { background: var(--cn-red); color: white; border-color: var(--cn-red); }

.container { max-width: 1240px; margin: 0 auto; padding: 0 36px; }
.container-narrow { max-width: 860px; margin: 0 auto; padding: 0 36px; }

.footer { margin-top: 80px; padding: 36px; border-top: 1px solid var(--ink); font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft); display: flex; justify-content: space-between; }

@media print {
  .topbar, .footer, .no-print { display: none !important; }
  body { background: #fff; }
  .card, .callout, .prompt { break-inside: avoid; }
  @page { margin: 1.2cm; }
}
</style>
<style>
/* ============================================================
   Index page — hero, sections, guides grid
   ============================================================ */

.hero { padding: 64px 36px 44px; border-bottom: 1px solid var(--ink); position: relative; }
.hero h1 {
  font-family: var(--serif);
  font-weight: 300;
  font-size: clamp(52px, 8.5vw, 120px);
  line-height: 0.92;
  letter-spacing: -0.035em;
  margin: 0 0 24px 0;
  max-width: 15ch;
}
.hero h1 em { font-style: italic; font-weight: 400; color: var(--cn-red); }
.hero .lede { font-family: var(--serif); font-size: 21px; line-height: 1.4; max-width: 62ch; margin: 0; color: var(--ink-2); font-weight: 300; }
.hero .meta { display: flex; gap: 24px; margin-top: 30px; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); flex-wrap: wrap; }
.hero .meta span b { color: var(--ink); font-weight: 500; }

.section { padding: 56px 0 36px; }
.section-head { display: grid; grid-template-columns: 180px 1fr; gap: 36px; padding: 0 36px 26px; align-items: end; }
.section-head .num { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 68px; line-height: 0.9; color: var(--cn-red); }
.section-head h2 { font-family: var(--serif); font-weight: 300; font-size: 46px; line-height: 1; letter-spacing: -0.025em; margin: 0 0 6px 0; }
.section-head p { margin: 0; max-width: 62ch; color: var(--ink-2); font-size: 15px; }

/* Four Questions */
.fourq { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
.fq { background: var(--paper); padding: 32px 24px 28px; min-height: 280px; display: flex; flex-direction: column; }
.fq .qn { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 72px; line-height: 0.88; color: var(--cn-red); margin-bottom: 10px; }
.fq h4 { font-family: var(--serif); font-weight: 400; font-size: 22px; letter-spacing: -0.01em; line-height: 1.1; margin: 0 0 10px 0; }
.fq p { font-size: 13.5px; line-height: 1.5; color: var(--ink-2); margin: 0 0 12px 0; flex: 1; }
.fq .ex { font-family: var(--mono); font-size: 10.5px; color: var(--ink-soft); line-height: 1.45; border-top: 1px solid color-mix(in srgb, var(--ink) 20%, transparent); padding-top: 10px; }

/* Guides grid */
.guides { display: grid; grid-template-columns: repeat(12, 1fr); gap: 1px; background: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
.guide {
  grid-column: span 4; background: var(--paper);
  padding: 26px 24px 22px;
  text-decoration: none; color: var(--ink);
  display: flex; flex-direction: column; min-height: 240px;
  transition: background .18s ease; cursor: pointer;
}
.guide:hover { background: var(--card); }
.guide .num { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; color: var(--ink-soft); }
.guide .cat { font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cn-red); margin-top: 2px; }
.guide h3 { font-family: var(--serif); font-weight: 400; font-size: 28px; line-height: 1.05; letter-spacing: -0.02em; margin: 14px 0 8px; }
.guide p { font-size: 13.5px; line-height: 1.5; color: var(--ink-2); margin: 0; flex: 1; }
.guide .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-soft); }
.guide .foot .arrow { width: 26px; height: 26px; border: 1px solid var(--ink); border-radius: 50%; display: grid; place-items: center; transition: all .2s ease; }
.guide:hover .foot .arrow { background: var(--cn-red); border-color: var(--cn-red); color: white; transform: rotate(-45deg); }

.guide.feature { grid-column: span 8; background: var(--paper-2); color: var(--ink); min-height: 300px; border-right: 4px solid var(--cn-red); }
.guide.feature:hover { background: var(--card); }
.guide.feature .num { color: var(--ink-soft); }
.guide.feature .cat { color: var(--cn-red); }
.guide.feature h3 { font-size: 52px; max-width: 18ch; margin-top: 24px; }
.guide.feature p { color: var(--ink-2); font-size: 15px; max-width: 50ch; }
.guide.feature .foot { color: var(--ink-soft); }
.guide.feature .foot .arrow { border-color: var(--ink); color: var(--ink); }

.guide.wide { grid-column: span 6; }
.guide.half { grid-column: span 6; }

.strip { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
.strip > div { padding: 36px; }
.strip > div + div { border-left: 1px solid var(--ink); }
.strip h4 { font-family: var(--serif); font-weight: 400; font-size: 28px; margin: 8px 0 12px; letter-spacing: -0.015em; }
.strip p { margin: 0; color: var(--ink-2); font-size: 15px; max-width: 48ch; }

.quickbar { background: var(--ink); color: var(--paper); padding: 16px 36px; display: flex; align-items: center; justify-content: space-between; gap: 20px; font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; }
.quickbar a { color: var(--paper); text-decoration: none; border-bottom: 1px solid transparent; padding-bottom: 2px; }
.quickbar a:hover { border-bottom-color: var(--cn-red); }
.quickbar .pulse { display: inline-block; width: 8px; height: 8px; background: var(--cn-red); border-radius: 50%; margin-right: 10px; animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

.filters { padding: 0 36px 18px; display: flex; gap: 8px; flex-wrap: wrap; }
.chip { padding: 7px 14px; border: 1px solid var(--ink); font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; background: transparent; color: var(--ink); border-radius: 2px; }
.chip.active { background: var(--ink); color: var(--paper); }
.chip:hover:not(.active) { background: var(--paper-2); }

/* Audience pills */
.audiences { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px; background: var(--ink); border-top: 1px solid var(--ink); border-bottom: 1px solid var(--ink); }
.aud { background: var(--paper); padding: 22px 18px; }
.aud .n { font-family: var(--mono); font-size: 9px; color: var(--ink-soft); letter-spacing: 0.12em; }
.aud h5 { font-family: var(--serif); font-weight: 400; font-size: 18px; letter-spacing: -0.01em; margin: 6px 0 8px; line-height: 1.1; }
.aud p { font-size: 12px; line-height: 1.45; color: var(--ink-2); margin: 0; }

@media (max-width: 1000px) {
  .fourq { grid-template-columns: 1fr 1fr; }
  .audiences { grid-template-columns: 1fr 1fr 1fr; }
  .guide, .guide.feature, .guide.wide, .guide.half { grid-column: span 12; }
  .strip { grid-template-columns: 1fr; }
  .strip > div + div { border-left: 0; border-top: 1px solid var(--ink); }
  .section-head { grid-template-columns: 1fr; gap: 10px; }
}
</style>
<style>
/* ============================================================
   Tab navigation
   ============================================================ */

.tabs { display: flex; gap: 0; }
.tab {
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  background: none; border: none; color: var(--ink); cursor: pointer;
  padding: 0 13px 2px; border-bottom: 2px solid transparent;
}
.tab:hover { color: var(--cn-red); }
.tab.active { border-bottom-color: var(--cn-red); }
.tab-content { display: none; }
.tab-content.active { display: block; }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="cn-mark"><span class="c">CN</span></span>
    <span>The AI Playbook</span>
  </div>
  <nav class="tabs">
    <button class="tab active" data-tab="start">Start Here</button>
    <button class="tab" data-tab="guides">Guides</button>
    <button class="tab" data-tab="learn">Learn</button>
    <button class="tab" data-tab="tools">Your Tools</button>
    <button class="tab" data-tab="poster">Poster</button>
  </nav>
</div>

<main>
  <div class="tab-content active" id="tab-start"></div>
  <div class="tab-content" id="tab-guides"></div>
  <div class="tab-content" id="tab-learn"></div>
  <div class="tab-content" id="tab-tools"></div>
  <div class="tab-content" id="tab-poster"></div>
</main>

<footer class="footer">
  <div>The AI Playbook &middot; Self-service library &middot; Maintained by Communications</div>
  <div>v2.0 &middot; April 2026</div>
</footer>

<script>
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    window.scrollTo(0, 0);
  });
});
</script>
</body>
</html>
