<!doctype html>
<html lang="en"><head>
<meta charset="utf-8" /><meta name="viewport" content="width=1440, initial-scale=1" />
<title>The Signal — Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>/* The Signal — creator app */

:root {
  /* CN palette, reinterpreted lighter & fresher */
  --cn-red: #ED0500;
  --cn-red-600: #CE0400;
  --cn-red-50: #FFF1F0;
  --cn-red-100: #FFDFDD;

  --ink-950: #0B0D10;
  --ink-900: #14181D;
  --ink-800: #1F252C;
  --ink-700: #3A4450;
  --ink-600: #5A6674;
  --ink-500: #7A8593;
  --ink-400: #A0A9B5;
  --ink-300: #C5CCD4;
  --ink-200: #E2E6EB;
  --ink-150: #EDF0F3;
  --ink-100: #F4F6F8;
  --ink-50:  #FAFBFC;

  --paper: #FDFCF9;         /* warm off-white */
  --paper-2: #F6F4EE;       /* tint for cards */
  --surface: #ffffff;
  --surface-2: var(--ink-50);

  --border: #E6E4DE;
  --border-strong: #D6D3CB;

  --amber: #E8A93A;
  --forest: #2E6F4E;
  --signal-blue: #2F62D8;

  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;

  --shadow-sm: 0 1px 2px rgba(12, 16, 22, 0.05), 0 1px 1px rgba(12, 16, 22, 0.03);
  --shadow-md: 0 4px 14px rgba(12, 16, 22, 0.06), 0 1px 3px rgba(12, 16, 22, 0.04);
  --shadow-lg: 0 18px 40px rgba(12, 16, 22, 0.10), 0 4px 12px rgba(12, 16, 22, 0.06);

  --font-sans: "Inter Tight", "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --font-display: "Instrument Serif", "Spectral", ui-serif, Georgia, serif;
  --font-mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --stage-thickness: 44px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }

body {
  font-family: var(--font-sans);
  color: var(--ink-900);
  background: var(--paper);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "ss01", "cv11";
}

button {
  font: inherit;
  cursor: pointer;
  border: 0;
  background: none;
  color: inherit;
}

input, textarea, select {
  font: inherit;
  color: inherit;
}

/* ── App chrome ─────────────────────────────────────── */

.app {
  display: grid;
  grid-template-columns: 272px 1fr;
  grid-template-rows: 52px 1fr;
  height: 100vh;
  overflow: hidden;
}

.topbar {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 0 16px 0 20px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  z-index: 5;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-display);
  font-size: 20px;
  letter-spacing: -0.01em;
  font-weight: 500;
}

.brand-mark {
  width: 22px; height: 22px;
  position: relative;
  display: inline-flex;
  align-items: center; justify-content: center;
}
.brand-mark::before {
  content: "";
  position: absolute;
  inset: 0;
  background: var(--cn-red);
  border-radius: 3px;
  transform: rotate(-12deg);
}
.brand-mark::after {
  content: "";
  position: absolute;
  inset: 3px;
  background: var(--paper);
  border-radius: 2px;
  transform: rotate(-12deg);
}
.brand-mark span {
  position: relative;
  z-index: 1;
  width: 6px; height: 6px;
  background: var(--cn-red);
  border-radius: 50%;
}

.topbar .divider { width: 1px; height: 20px; background: var(--border); }

.topbar .crumbs {
  display: flex; align-items: center; gap: 8px;
  color: var(--ink-600);
  font-size: 13px;
}
.topbar .crumbs .ep-name { color: var(--ink-900); font-weight: 500; }
.topbar .crumbs .sep { color: var(--ink-400); }

.topbar .spacer { flex: 1; }

.topbar .right {
  display: flex; align-items: center; gap: 8px;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 8px;
  background: var(--ink-100);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--ink-700);
  font-weight: 500;
}
.status-pill .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink-400);
}
.status-pill.draft .dot { background: var(--amber); }
.status-pill.review .dot { background: var(--signal-blue); }
.status-pill.ready .dot { background: var(--forest); }
.status-pill.published .dot { background: var(--forest); }

.icon-btn {
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-700);
  transition: background 120ms;
}
.icon-btn:hover { background: var(--ink-100); color: var(--ink-900); }

/* ── Sidebar library ────────────────────────────────── */

.sidebar {
  border-right: 1px solid var(--border);
  background: var(--paper-2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 14px 14px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-header .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-500);
}
.new-ep-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--cn-red);
  color: white;
  padding: 6px 10px;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(206,4,0,0.25);
}
.new-ep-btn:hover { background: var(--cn-red-600); }

.sidebar-search {
  padding: 0 12px 10px;
}
.sidebar-search input {
  width: 100%;
  padding: 7px 10px;
  border: 1px solid var(--border);
  background: white;
  border-radius: var(--r-sm);
  font-size: 13px;
  outline: none;
}
.sidebar-search input:focus { border-color: var(--ink-400); }

.sidebar-tabs {
  display: flex;
  padding: 0 12px;
  gap: 2px;
  border-bottom: 1px solid var(--border);
}
.sidebar-tab {
  padding: 6px 10px;
  font-size: 12px;
  color: var(--ink-600);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.sidebar-tab.active {
  color: var(--ink-900);
  border-bottom-color: var(--cn-red);
  font-weight: 500;
}

.episode-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 8px 40px;
}

.ep-row {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  gap: 10px;
  padding: 8px;
  border-radius: var(--r-md);
  cursor: pointer;
  align-items: center;
  transition: background 120ms;
}
.ep-row:hover { background: rgba(0,0,0,0.04); }
.ep-row.active {
  background: white;
  box-shadow: var(--shadow-sm);
  outline: 1px solid var(--border);
}

.ep-thumb {
  width: 40px; height: 40px;
  border-radius: 6px;
  background: var(--ink-800);
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  overflow: hidden;
  position: relative;
  flex-shrink: 0;
}

.ep-meta { min-width: 0; }
.ep-meta .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-900);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.ep-meta .sub {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px;
  color: var(--ink-500);
  margin-top: 2px;
}
.ep-meta .sub .dot { width: 4px; height: 4px; background: var(--ink-300); border-radius: 50%; }

.ep-num {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-500);
}

.ep-state-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--ink-150);
  color: var(--ink-700);
  letter-spacing: 0.02em;
}
.ep-state-chip.draft { background: #FFF4DE; color: #8A5A00; }
.ep-state-chip.review { background: #E6EDFA; color: #2A4E9D; }
.ep-state-chip.ready { background: #E1F0E8; color: #1F5A3C; }
.ep-state-chip.published { background: var(--ink-800); color: white; }

/* ── Main workspace ─────────────────────────────────── */

.workspace {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--paper);
}

.stage-rail {
  display: flex;
  align-items: stretch;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  height: var(--stage-thickness);
  gap: 2px;
  overflow-x: auto;
}

.stage-step {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 0 14px;
  font-size: 13px;
  color: var(--ink-500);
  border-bottom: 2px solid transparent;
  position: relative;
  white-space: nowrap;
  transition: color 120ms;
}
.stage-step:hover { color: var(--ink-800); }
.stage-step.active {
  color: var(--ink-900);
  font-weight: 500;
  border-bottom-color: var(--cn-red);
}
.stage-step .num {
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 50%;
  background: var(--ink-150);
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-600);
  font-family: var(--font-mono);
}
.stage-step.active .num {
  background: var(--cn-red);
  color: white;
}
.stage-step.done .num {
  background: var(--forest);
  color: white;
}
.stage-step.done { color: var(--ink-700); }
.stage-step.done::after {
  /* tiny check */
}

.stage-body {
  flex: 1;
  overflow: auto;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* Stage-scoped layouts */

.panel-pad { padding: 24px 28px; }

.hello-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 24px;
}
.hello-head h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 34px;
  letter-spacing: -0.02em;
  line-height: 1.05;
  margin: 0 0 4px;
}
.hello-head .sub {
  color: var(--ink-600);
  font-size: 13px;
}

/* ── Stage 1: Theme ─────────────────────────────────── */

.theme-grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

.theme-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px 16px;
  cursor: pointer;
  transition: border-color 120ms, box-shadow 120ms, transform 120ms;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.theme-card:hover {
  border-color: var(--ink-300);
  box-shadow: var(--shadow-md);
}
.theme-card.selected {
  border-color: var(--cn-red);
  box-shadow: 0 0 0 3px var(--cn-red-50);
}
.theme-card .ix {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-400);
  letter-spacing: 0.1em;
}
.theme-card h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  line-height: 1.15;
  margin: 0;
  letter-spacing: -0.01em;
  color: var(--ink-900);
  max-width: 30ch;
}
.theme-card .pitch {
  font-size: 13px;
  color: var(--ink-600);
  line-height: 1.5;
}
.theme-card .preview-sources {
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px dashed var(--border);
  display: flex; flex-direction: column; gap: 4px;
}
.theme-card .preview-sources span {
  font-size: 11px;
  color: var(--ink-500);
  display: flex; align-items: center; gap: 6px;
}
.theme-card .preview-sources span::before {
  content: ""; width: 3px; height: 3px; border-radius: 50%; background: var(--ink-400);
}

.theme-custom {
  margin-top: 16px;
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 14px 16px;
  border: 1px dashed var(--border-strong);
  border-radius: var(--r-lg);
  background: rgba(255,255,255,0.5);
}
.theme-custom label {
  font-size: 12px; color: var(--ink-600); font-weight: 500; white-space: nowrap;
}
.theme-custom input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 7px 10px;
  background: white;
  outline: none;
}
.theme-custom input:focus { border-color: var(--ink-400); }

/* ── Stage 2: Articles ──────────────────────────────── */

.articles-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 300px;
  height: 100%;
  overflow: hidden;
}

.articles-col {
  display: flex; flex-direction: column;
  min-width: 0;
  border-right: 1px solid var(--border);
  overflow: hidden;
}
.articles-col:last-child { border-right: 0; }

.col-head {
  padding: 12px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.col-head .title {
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 600;
}
.col-head .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-500);
}

.article-list {
  flex: 1; overflow-y: auto; padding: 8px;
}

.article-row {
  padding: 10px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  display: grid;
  grid-template-columns: 20px 1fr;
  gap: 10px;
  align-items: start;
  transition: background 100ms;
}
.article-row:hover { background: var(--ink-100); }
.article-row.active {
  background: white;
  outline: 1px solid var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.article-row.selected { background: var(--cn-red-50); }
.article-row.selected.active { outline-color: var(--cn-red); }

.article-row .checkbox {
  width: 16px; height: 16px;
  border: 1.5px solid var(--ink-300);
  border-radius: 4px;
  background: white;
  display: inline-flex;
  align-items: center; justify-content: center;
  margin-top: 2px;
  flex-shrink: 0;
}
.article-row.selected .checkbox {
  background: var(--cn-red);
  border-color: var(--cn-red);
}
.article-row.selected .checkbox::after {
  content: "";
  width: 5px; height: 8px;
  border-right: 1.5px solid white;
  border-bottom: 1.5px solid white;
  transform: rotate(45deg) translate(-1px, -1px);
}
.article-row .body { min-width: 0; }
.article-row .title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-900);
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.article-row .meta {
  display: flex;
  gap: 6px;
  align-items: center;
  font-size: 11px;
  color: var(--ink-500);
  margin-top: 4px;
}
.article-row .source {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 1px 6px;
  background: var(--ink-100);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-700);
}
.article-row .score {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-500);
  margin-left: auto;
  padding-left: 8px;
}
.score-bar {
  width: 100%;
  height: 3px;
  background: var(--ink-150);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}
.score-bar > div { height: 100%; background: var(--cn-red); }

.filter-row {
  display: flex; gap: 6px; padding: 0 16px 10px;
  overflow-x: auto;
}
.filter-chip {
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 999px;
  background: var(--ink-100);
  color: var(--ink-700);
  white-space: nowrap;
  font-weight: 500;
}
.filter-chip.active { background: var(--ink-900); color: white; }

/* preview pane */
.preview-pane {
  padding: 18px 22px;
  overflow-y: auto;
  background: var(--surface);
}
.preview-pane h2 {
  font-size: 18px;
  line-height: 1.3;
  font-weight: 600;
  color: var(--ink-900);
  margin: 0 0 8px;
  letter-spacing: -0.01em;
}
.preview-pane .source-line {
  font-size: 12px;
  color: var(--ink-500);
  margin-bottom: 20px;
  display: flex; gap: 6px; align-items: center;
}
.preview-pane .source-line a {
  color: var(--signal-blue);
  text-decoration: none;
}
.preview-pane .summary {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-800);
  padding: 14px 16px;
  background: var(--ink-50);
  border-left: 3px solid var(--cn-red);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
}
.preview-pane .body-text {
  margin-top: 16px;
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-800);
  max-width: 68ch;
}
.preview-pane .body-text p { margin: 0 0 14px; }

.score-grid {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 18px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.score-grid .label {
  font-size: 11px;
  color: var(--ink-500);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.score-grid .value {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink-900);
}

.preview-actions {
  display: flex;
  gap: 8px;
  margin-top: 20px;
}

/* selected lane */
.lane {
  background: var(--paper-2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.lane .col-head { border-bottom: 1px solid var(--border); }
.lane-list {
  flex: 1; overflow-y: auto; padding: 10px;
  display: flex; flex-direction: column; gap: 8px;
}

.lane-item {
  background: white;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px 12px 12px;
  display: grid;
  grid-template-columns: 14px 1fr auto;
  gap: 8px;
  align-items: start;
  cursor: grab;
  position: relative;
}
.lane-item:active { cursor: grabbing; }
.lane-item.dragging {
  opacity: 0.5;
  transform: scale(0.98);
}
.lane-item .handle {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-400);
  padding-top: 2px;
}
.lane-item .idx {
  display: inline-block;
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--cn-red);
  color: white;
  font-size: 11px;
  font-weight: 700;
  text-align: center;
  line-height: 18px;
  font-family: var(--font-mono);
}
.lane-item h4 {
  margin: 0;
  font-size: 12.5px;
  line-height: 1.35;
  font-weight: 500;
  color: var(--ink-900);
}
.lane-item .meta {
  font-size: 10.5px;
  color: var(--ink-500);
  margin-top: 4px;
  font-family: var(--font-mono);
}
.lane-item .remove {
  font-size: 14px;
  color: var(--ink-400);
  padding: 2px 4px;
  line-height: 1;
}
.lane-item .remove:hover { color: var(--cn-red); }

.lane-empty {
  padding: 40px 20px;
  text-align: center;
  color: var(--ink-500);
  font-size: 12.5px;
  line-height: 1.5;
}
.lane-empty .kbd {
  display: inline-block;
  padding: 1px 5px;
  background: var(--ink-100);
  border: 1px solid var(--border);
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-700);
}

.lane-footer {
  padding: 12px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--paper-2);
}
.lane-footer .stats {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--ink-600);
}
.lane-footer .stats .num {
  font-family: var(--font-mono); color: var(--ink-900);
}

/* ── Buttons ────────────────────────────────────────── */

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 14px;
  border-radius: var(--r-sm);
  font-size: 13px;
  font-weight: 500;
  background: var(--ink-100);
  color: var(--ink-900);
  border: 1px solid transparent;
  transition: all 120ms;
  white-space: nowrap;
}
.btn:hover { background: var(--ink-150); }
.btn.primary {
  background: var(--cn-red);
  color: white;
  box-shadow: 0 1px 2px rgba(206,4,0,0.25);
}
.btn.primary:hover { background: var(--cn-red-600); }
.btn.primary:disabled { background: var(--ink-300); cursor: not-allowed; box-shadow: none; }
.btn.ghost {
  background: transparent;
  color: var(--ink-700);
}
.btn.ghost:hover { background: var(--ink-100); }
.btn.outlined {
  background: white;
  border-color: var(--border-strong);
  color: var(--ink-900);
}
.btn.outlined:hover { border-color: var(--ink-700); }
.btn.danger-ghost {
  color: var(--cn-red);
  background: transparent;
}
.btn.danger-ghost:hover { background: var(--cn-red-50); }

.btn-sm {
  padding: 5px 10px;
  font-size: 12px;
}
.btn-lg {
  padding: 10px 18px;
  font-size: 14px;
}

/* ── Stage 3: Script ────────────────────────────────── */

.script-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  height: 100%;
  overflow: hidden;
}

.editor-col {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.editor-head {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
  background: var(--surface);
}
.editor-head .meter {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-600);
}
.meter-bar {
  width: 140px; height: 6px; border-radius: 3px;
  background: var(--ink-150);
  overflow: hidden;
  position: relative;
}
.meter-bar .target {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--forest);
  opacity: 0.2;
}
.meter-bar .fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--cn-red);
  transition: width 200ms;
}
.meter-bar.in-range .fill { background: var(--forest); }
.meter-bar.over .fill { background: var(--amber); }

.editor-body {
  flex: 1;
  overflow-y: auto;
  padding: 28px 0 40px;
  display: flex;
  justify-content: center;
}
.editor-content {
  width: 100%;
  max-width: 720px;
  padding: 0 40px;
}

.script-section {
  border-left: 3px solid transparent;
  padding: 6px 14px;
  margin: 0 -14px 18px;
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  position: relative;
  cursor: text;
  transition: border-color 100ms, background 100ms;
}
.script-section:hover { border-left-color: var(--border-strong); background: rgba(0,0,0,0.015); }
.script-section.focused { border-left-color: var(--cn-red); background: var(--cn-red-50); }
.script-section .label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-500);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.script-section.focused .label { color: var(--cn-red); }
.script-section .wc {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-400);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.script-section .content {
  font-size: 16px;
  line-height: 1.7;
  color: var(--ink-900);
  outline: none;
  white-space: pre-wrap;
  min-height: 1.7em;
  font-family: var(--font-sans);
}
.script-section .content p { margin: 0 0 14px; }
.script-section .content em { color: var(--ink-700); font-style: italic; }
.script-section .content .tag {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 1px 6px;
  background: var(--ink-100);
  border-radius: 3px;
  color: var(--ink-600);
  margin: 0 2px;
  font-style: normal;
}

/* inspector */
.inspector {
  background: var(--paper-2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 0;
}
.inspector-section {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
}
.inspector-section:last-child { border-bottom: 0; }
.inspector h4 {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-500);
  font-weight: 600;
  margin: 0 0 10px;
}
.inspector-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  padding: 4px 0;
}
.inspector-row .k { color: var(--ink-600); }
.inspector-row .v { font-family: var(--font-mono); color: var(--ink-900); }

.source-cite {
  display: flex;
  align-items: start;
  gap: 8px;
  padding: 6px 0;
  font-size: 12px;
}
.source-cite .idx {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 4px;
  background: var(--ink-150);
  border-radius: 3px;
  flex-shrink: 0;
  margin-top: 2px;
}
.source-cite .title { color: var(--ink-800); line-height: 1.35; }
.source-cite .domain { font-size: 10px; color: var(--ink-500); margin-top: 2px; }

/* ── Stage 4: Cover ─────────────────────────────────── */

.cover-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  height: 100%;
  overflow: hidden;
}

.cover-stage {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  background:
    radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 70%),
    var(--paper-2);
  overflow: hidden;
  position: relative;
}

.cover-frame {
  width: min(560px, 100%);
  aspect-ratio: 1 / 1;
  background: white;
  border-radius: 6px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
  container-type: size;
}

.cover-inspector {
  background: var(--paper-2);
  border-left: 1px solid var(--border);
  overflow-y: auto;
}

.template-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.template-thumb {
  aspect-ratio: 1 / 1;
  border-radius: var(--r-sm);
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  background: white;
  position: relative;
}
.template-thumb.active {
  border-color: var(--cn-red);
  box-shadow: 0 0 0 3px var(--cn-red-50);
}
.template-thumb .tlabel {
  position: absolute;
  left: 6px; bottom: 6px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 1px 4px;
  background: rgba(255,255,255,0.85);
  color: var(--ink-900);
  border-radius: 2px;
  font-family: var(--font-mono);
}

.swatch-grid {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid white;
  outline: 1px solid var(--border);
}
.swatch.active { outline: 2px solid var(--ink-900); outline-offset: 1px; }

.ctrl-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.ctrl-row label { font-size: 12px; color: var(--ink-600); min-width: 62px; }
.ctrl-row input[type="text"], .ctrl-row input[type="number"] {
  flex: 1;
  border: 1px solid var(--border);
  background: white;
  border-radius: var(--r-sm);
  padding: 6px 8px;
  font-size: 12.5px;
  outline: none;
}
.ctrl-row input:focus { border-color: var(--ink-400); }
.ctrl-row input[type="range"] { flex: 1; accent-color: var(--cn-red); }

.export-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  margin-top: 10px;
}
.export-btn {
  padding: 8px 4px;
  border: 1px solid var(--border);
  background: white;
  border-radius: var(--r-sm);
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font-mono);
  color: var(--ink-700);
}
.export-btn:hover { border-color: var(--ink-700); color: var(--ink-900); }

/* ── Stage 5: Audio ─────────────────────────────────── */
.audio-body { padding: 32px 40px; max-width: 820px; margin: 0 auto; width: 100%; }

.waveform {
  height: 96px;
  width: 100%;
  background: var(--ink-50);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  position: relative;
  overflow: hidden;
  margin: 20px 0;
}
.waveform svg { display: block; width: 100%; height: 100%; }
.waveform .playhead {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: var(--cn-red);
  pointer-events: none;
}

.audio-controls {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.big-play {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--cn-red);
  color: white;
  display: inline-flex; align-items: center; justify-content: center;
}

.tts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
}
.tts-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  cursor: pointer;
}
.tts-card.active {
  border-color: var(--cn-red);
  box-shadow: 0 0 0 3px var(--cn-red-50);
}
.tts-card .name { font-weight: 600; font-size: 14px; }
.tts-card .desc { font-size: 12px; color: var(--ink-600); margin-top: 4px; }

/* ── Stage 6: Publish ───────────────────────────────── */
.publish-body {
  padding: 32px 40px;
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}

.artifact-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin: 20px 0;
}
.artifact {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.artifact .icon {
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  background: var(--ink-100);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--ink-700);
}
.artifact .name { font-weight: 500; font-size: 13px; }
.artifact .size { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }
.artifact .go { margin-left: auto; color: var(--ink-500); font-size: 11px; }

.teams-preview {
  background: #F5F5F4;
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 16px 18px;
  margin-top: 16px;
  font-size: 13px;
  line-height: 1.6;
}
.teams-preview .handle {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px;
  color: var(--ink-700);
  font-size: 12px;
}
.teams-preview .handle .av {
  width: 22px; height: 22px; border-radius: 50%; background: var(--cn-red);
  color: white; font-weight: 700; font-size: 10px; display: inline-flex;
  align-items: center; justify-content: center;
}

/* ── Footer action bar ──────────────────────────────── */
.footer-actions {
  height: 56px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 0 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.footer-actions .hint {
  font-size: 12px;
  color: var(--ink-500);
}

/* ── Details drawer (telemetry) ─────────────────────── */
.details-drawer {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 320px;
  max-height: calc(100% - 120px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  z-index: 20;
  display: flex; flex-direction: column;
}
.details-drawer .dh {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; font-weight: 600; color: var(--ink-800);
}
.details-drawer .dc {
  padding: 10px 14px;
  overflow-y: auto;
  font-size: 12px;
}
.telemetry-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px dashed var(--border);
  font-family: var(--font-mono);
  font-size: 11px;
}
.telemetry-row:last-child { border-bottom: 0; }
.telemetry-row .k { color: var(--ink-600); }
.telemetry-row .v { color: var(--ink-900); }

/* ── Tweaks panel ───────────────────────────────────── */
.tweaks-panel {
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: 260px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-lg);
  z-index: 100;
  overflow: hidden;
  display: none;
}
.tweaks-panel.open { display: block; }
.tweaks-panel .h {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
  color: var(--ink-800);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--paper-2);
}
.tweaks-panel .c { padding: 12px 14px; display: flex; flex-direction: column; gap: 10px; font-size: 12px; }
.tweaks-panel .c .row {
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.tweaks-panel .c label { color: var(--ink-600); }
.tweaks-panel .c select, .tweaks-panel .c input {
  border: 1px solid var(--border); border-radius: 4px; padding: 3px 6px; font-size: 12px;
  background: white;
}

/* scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-track { background: transparent; }
*::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
*::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); background-clip: padding-box; border: 2px solid transparent; }

/* utilities */
.muted { color: var(--ink-500); }
.mono { font-family: var(--font-mono); }
.ellipsis { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flex { display: flex; }
.flex-1 { flex: 1; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }


/* ── Publish v2: share-primary + try-this picker ─────── */
.share-primary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  margin-top: 20px;
  box-shadow: 0 1px 2px rgba(15, 20, 30, 0.03);
}
.share-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px dashed var(--border);
}
.share-head .k {
  font-size: 10px; letter-spacing: 0.14em; color: var(--ink-500); font-weight: 600;
  font-family: var(--font-mono); margin-bottom: 4px;
}
.share-head .v { font-size: 13px; color: var(--ink-700); }
.share-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; min-width: 240px; }
.btn.copied { background: var(--forest) !important; border-color: var(--forest) !important; }

.share-note {
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--ink-50);
  border-radius: var(--r-sm);
  display: flex; gap: 8px; align-items: flex-start;
  font-size: 12px; color: var(--ink-600);
}
.share-note svg { flex-shrink: 0; margin-top: 1px; color: var(--signal-blue); }

/* Block headings between sections */
.block-head {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 12px;
}
.block-head h3 {
  font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-700); font-weight: 600; margin: 0;
}
.block-head .mono {
  font-size: 10px; letter-spacing: 0.06em; color: var(--ink-500);
  padding: 2px 6px; background: var(--ink-100); border-radius: 3px;
  text-transform: uppercase;
}
.block-head button { margin-left: auto; }

/* Try-this placement picker */
.try-this-picker {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
}
.try-option {
  padding: 14px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r-md); cursor: pointer; transition: 150ms;
}
.try-option:hover { border-color: var(--ink-300); }
.try-option.active {
  border-color: var(--cn-red);
  box-shadow: 0 0 0 3px var(--cn-red-50);
  background: color-mix(in oklch, var(--cn-red) 2%, var(--surface));
}
.try-option .t { font-size: 13px; font-weight: 600; color: var(--ink-900); margin-bottom: 4px; }
.try-option .d { font-size: 12px; color: var(--ink-600); line-height: 1.5; margin-bottom: 10px; }
.try-option .r {
  font-size: 10px; font-family: var(--font-mono); letter-spacing: 0.04em;
  color: var(--ink-500); text-transform: uppercase;
}
.try-option .r span { color: var(--ink-400); }
.try-option.active .r { color: var(--cn-red); }

/* Format badge on artifacts */
.fmt-badge {
  display: inline-block;
  font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.06em;
  padding: 1px 5px; background: var(--cn-red); color: white;
  border-radius: 3px; margin-left: 6px;
  vertical-align: middle;
}


/* ── Theme stage: stats + filter + card variants + bank modal ──── */
.theme-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 24px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
}
.theme-stats > div { display: flex; flex-direction: column; gap: 2px; }
.theme-stats .k {
  font-size: 10px; letter-spacing: 0.12em; color: var(--ink-500);
  font-family: var(--font-mono); font-weight: 600;
}
.theme-stats .v {
  font-size: 22px; font-weight: 600; color: var(--ink-900);
  font-family: var(--font-display); line-height: 1;
}
.theme-stats .d { font-size: 11px; color: var(--ink-500); margin-top: 2px; }

.theme-filter {
  display: flex; gap: 6px; align-items: center;
  margin: 18px 0 0;
  padding: 0;
}

.theme-card { padding: 14px 16px 12px; gap: 8px; }
.theme-card h3 { font-size: 15px; line-height: 1.3; }
.theme-card .pitch { font-size: 12.5px; line-height: 1.5; }
.theme-card .preview-sources { font-size: 11px; }
.theme-card .preview-sources span { padding: 2px 6px; }
.theme-card .ix { font-size: 9px; }

.tc-head {
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
  margin-bottom: 2px;
}
.tc-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600;
  padding: 3px 7px; border-radius: 3px;
  font-family: var(--font-mono);
}
.tc-tag.bank { background: var(--ink-100); color: var(--ink-700); }
.tc-tag.generated { background: var(--cn-red-50); color: var(--cn-red); }

.tc-foot {
  margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--border);
  font-size: 11px; color: var(--ink-500);
}
.tc-foot .cooldown { font-family: var(--font-mono); }
.theme-card.origin-generated { border-left: 2px solid var(--cn-red); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,20,30,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 40px;
}
.modal {
  background: var(--paper); border-radius: var(--r-lg);
  max-width: 920px; width: 100%; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
.modal-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 20px 24px; border-bottom: 1px solid var(--border);
}
.modal-body { padding: 16px 24px 24px; overflow-y: auto; }

.bank-toolbar {
  display: flex; gap: 10px; align-items: center;
  padding-bottom: 12px; margin-bottom: 4px;
}
.bank-search {
  flex: 1; max-width: 260px;
  padding: 6px 10px; border: 1px solid var(--border);
  border-radius: var(--r-sm); font-size: 12px; font-family: var(--font-sans);
  background: var(--surface);
}

.bank-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.bank-table th {
  text-align: left; padding: 8px 10px;
  font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--ink-500); font-weight: 600; border-bottom: 1px solid var(--border);
  font-family: var(--font-mono);
}
.bank-table td {
  padding: 10px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.bank-table tr:last-child td { border-bottom: 0; }
.bank-table tr:hover td { background: var(--ink-50); }
.bank-tag {

    for (let r = 0; r < rows; r++) {
      const pts = [];
      const rowSeed = rng();
      const amp = 12 + rng() * 24;
      const freq = 0.8 + rng() * 1.8;
      const phase = rng() * Math.PI * 2;
      const yBase = 620 + r * 42 - rng() * 10;
      for (let c = 0; c <= cols; c++) {
        const x = 60 + (c / cols) * 880;
        const fall = Math.sin((c / cols) * Math.PI * freq + phase + rowSeed) * amp;
        const pulse = Math.exp(-Math.pow((c / cols - 0.6), 2) * 6) * 30;
        const y = yBase + fall + pulse * (r / rows);
        pts.push(`${x},${y}`);
      }
      lines.push(
        <polyline
          key={r}
          points={pts.join(" ")}
          fill="none"
          stroke={r < 3 ? p.accent : "#0B0D10"}
          strokeWidth={r < 3 ? 3 : 1.5}
          opacity={r < 3 ? 0.95 : 0.35}
        />
      );
    }
    return (
      <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", width: "100%", height: "100%" }}>
        <rect width="1000" height="1000" fill="#FDFCF9" />

        <foreignObject x="60" y="290" width="880" height="240">
          <div xmlns="http://www.w3.org/1999/xhtml" style={{ fontFamily: "Inter, sans-serif", fontSize: "54px", lineHeight: 1.1, color: "#0B0D10", fontWeight: 600, letterSpacing: "-0.01em", textWrap: "balance" }}>
            {p.theme || "Untitled"}
          </div>
        </foreignObject>
        {lines}
        <text x="940" y="950" fill="#5A6674" fontSize="18" fontFamily="'JetBrains Mono', monospace" textAnchor="end">AI + COMMS · CN</text>
      </svg>
    );
  };

  // ── Template 4: Grid — geometric, modular, punchy color ──
  const Grid = (p) => {
    const rng = mulberry32(hashStr(p.theme || "grid") ^ (p.seed || 0));
    const cells = [];
    const cols = 6, rows = 6;
    const cellW = 880 / cols, cellH = 420 / rows;
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const r = rng();
        const fill =
          r < 0.5 ? "transparent" :
          r < 0.7 ? p.accent :
          r < 0.88 ? "#0B0D10" :
          "#FDFCF9";
        const stroke = fill === "transparent" ? "#0B0D10" : "none";
        cells.push(
          <rect key={`${x}-${y}`}
            x={60 + x * cellW}
            y={540 + y * cellH}
            width={cellW}
            height={cellH}
            fill={fill}
            stroke={stroke}
            strokeWidth="1.5"
          />
        );
      }
    }
    return (
      <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", width: "100%", height: "100%" }}>
        <rect width="1000" height="1000" fill="#FDFCF9" />

  // ── Template 5: Ribbon — single bold typographic statement, CN red cut ──
  const Ribbon = (p) => {

        <polygon points="0,560 1000,480 1000,720 0,800" fill={p.accent} />
        <foreignObject x="60" y="90" width="880" height="400">

        <circle cx="940" cy="890" r="12" fill={p.accent} />
      </svg>
    );
  };

  // ── Template 6: Monolith — big number, minimalist, swiss ──
  const Monolith = (p) => (
    <svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" style={{ display: "block", width: "100%", height: "100%" }}>
      <rect width="1000" height="1000" fill="#0B0D10" />
      <text x="60" y="860" fill="white" fontSize="560" fontFamily="Inter, sans-serif" fontWeight="900" letterSpacing="-0.05em">{String(p.episodeNumber).padStart(2, "0")}</text>
      <rect x="60" y="80" width="4" height="80" fill={p.accent} />

      classic: Classic, editorial: Editorial, wave: Wave, grid: Grid, ribbon: Ribbon, monolith: Monolith,
    },

})();

// ── Stage: Articles ─────────────────────────────────────
const ArticlesStage = ({ selected, setSelected, onContinue, onBack }) => {
  const [activeIdx, setActiveIdx] = useState(1);
  const [filter, setFilter] = useState("all");
  const [draggingId, setDraggingId] = useState(null);

  const active = D.articles.find((a) => a.idx === activeIdx);
  const filtered = D.articles.filter((a) => {
    if (filter === "selected") return selected.includes(a.idx);
    if (filter === "fresh") return new Date(a.published) > new Date("2026-04-14");
    if (filter === "mainstream") return ["hbr.org", "reuters.com", "theglobeandmail.com", "technologyreview.com", "microsoft.com"].includes(a.source);
    return true;
  }).sort((a, b) => b.scores.total - a.scores.total);

  const toggle = (idx) => {
    if (selected.includes(idx)) setSelected(selected.filter((i) => i !== idx));
    else setSelected([...selected, idx]);
  };

  const move = (from, to) => {
    const next = [...selected];
    const [item] = next.splice(from, 1);
    next.splice(to, 0, item);
    setSelected(next);
  };

  return (
    <div className="stage-body" style={{ overflow: "hidden" }}>
      <div className="articles-layout">
        {/* List column */}
        <div className="articles-col">
          <div className="col-head">
            <span className="title">Ranked Articles</span>
            <span className="count mono">{filtered.length} / {D.articles.length}</span>
          </div>
          <div className="filter-row">
            {[["all", "All"], ["fresh", "Last 7 days"], ["mainstream", "Mainstream"], ["selected", "Selected"]].map(([k, l]) => (
              <button key={k} className={`filter-chip ${filter === k ? "active" : ""}`} onClick={() => setFilter(k)}>{l}</button>
            ))}
          </div>
          <div className="article-list">
            {filtered.map((a) => (
              <div key={a.idx}
                className={`article-row ${activeIdx === a.idx ? "active" : ""} ${selected.includes(a.idx) ? "selected" : ""}`}
                onClick={() => setActiveIdx(a.idx)}
              >
                <div className="checkbox" onClick={(e) => { e.stopPropagation(); toggle(a.idx); }} />
                <div className="body">
                  <div className="title">{a.title}</div>
                  <div className="meta">
                    <span className="source">{a.source}</span>
                    <span>{new Date(a.published + "T12:00").toLocaleDateString("en-CA", { month: "short", day: "numeric" })}</span>
                    <span className="score">{a.scores.total.toFixed(1)}</span>
                  </div>
                  <div className="score-bar"><div style={{ width: `${a.scores.total}%` }} /></div>
                </div>
              </div>
            ))}
          </div>
        </div>
        {/* Preview column */}
        <div className="articles-col">
          <div className="col-head">
            <span className="title">Preview</span>
            <span className="count mono">#{String(activeIdx).padStart(2, "0")}</span>
          </div>
          {active && (
            <div className="preview-pane">
              <h2>{active.title}</h2>
              <div className="source-line">
                <span className="mono" style={{ padding: "1px 6px", background: "var(--ink-100)", borderRadius: 3 }}>{active.source}</span>
                <span>·</span>
                <span>{new Date(active.published + "T12:00").toLocaleDateString("en-CA", { year: "numeric", month: "long", day: "numeric" })}</span>
                <span>·</span>
                <a href={active.url} target="_blank" rel="noreferrer">Open <Icon name="ext" size={11}/></a>
              </div>
              <div className="summary">{active.summary}</div>
              <div className="body-text">
                <p>Full text was captured successfully. <span className="muted">({Math.round(active.summary.length * 18 / 6)} words estimated)</span></p>
                <p style={{ color: "var(--ink-600)" }}>This article will be passed to the script writer with its full body preserved. The model is instructed to cite the source naturally in the narrative and avoid verbatim copying.</p>
              </div>
              <div className="score-grid">
                {[
                  ["Credibility", active.scores.credibility],
                  ["Comms relevance", active.scores.commsRelevance],
                  ["Freshness", active.scores.freshness],
                  ["AI materiality", active.scores.aiMateriality],
                  ["Preferred topic", active.scores.preferred],
                  ["Total", active.scores.total.toFixed(1)],
                ].map(([k, v]) => (
                  <React.Fragment key={k}>
                    <div className="label">{k}</div>
                    <div className="value">{v}</div>
                  </React.Fragment>
                ))}
              </div>
              <div className="preview-actions">
                <button className={`btn ${selected.includes(active.idx) ? "danger-ghost" : "primary"}`} onClick={() => toggle(active.idx)}>
                  {selected.includes(active.idx) ? <>Remove from selection</> : <><Icon name="plus" size={13}/>Add to selection</>}
                </button>
                <button className="btn outlined"><Icon name="fileText" size={13}/>Paste full text</button>
              </div>
            </div>
          )}
        </div>
        {/* Lane column */}
        <div className="lane articles-col">
          <div className="col-head">
            <span className="title">Selected · Play Order</span>
            <span className="count mono">{selected.length}</span>
          </div>
          <div className="lane-list">
            {selected.length === 0 ? (
              <div className="lane-empty">
                <div>No articles yet.</div>
                <div style={{ marginTop: 8 }}>Click <span className="kbd">+</span> on any article, or drag from the list.</div>
              </div>
            ) : selected.map((idx, i) => {
              const a = D.articles.find((x) => x.idx === idx);
              return (
                <div key={idx}

                  className={`lane-item ${draggingId === idx ? "dragging" : ""}`}
                  onDragStart={(e) => { setDraggingId(idx); e.dataTransfer.effectAllowed = "move"; }}
                  onDragEnd={() => setDraggingId(null)}
                  onDragOver={(e) => e.preventDefault()}
                  onDrop={(e) => {
                    e.preventDefault();
                    if (draggingId !== null && draggingId !== idx) {
                      const from = selected.indexOf(draggingId);
                      const to = selected.indexOf(idx);
                      move(from, to);
                    }
                  }}
                >
                  <div className="handle"><Icon name="drag" size={11}/></div>
                  <div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                      <span className="idx">{i + 1}</span>

          </div>
          <div className="lane-footer">
            <div className="stats">
              <span>Predicted runtime</span>
              <span className="num">~{4 + selected.length * 0.4}:{String(Math.round(Math.random() * 30)).padStart(2, "0")} min</span>
            </div>
            <div className="stats">
              <span>Target word count</span>
              <span className="num">{selected.length <= 1 ? "250-350" : selected.length === 2 ? "360-460" : selected.length === 3 ? "500-650" : "580-720"} words</span>
            </div>
            <div className="stats">
              <span>Source diversity</span>
              <span className="num">{new Set(selected.map((i) => D.articles.find((a) => a.idx === i)?.source)).size} domains</span>
            </div>
          </div>
        </div>
      </div>
      <FooterActions onBack={onBack} onNext={onContinue} nextLabel="Generate script" disabled={selected.length < 1} hint={`${selected.length} article${selected.length === 1 ? "" : "s"} in play order`} />
    </div>
  );
};

// ── Stage: Script ───────────────────────────────────────
const ScriptStage = ({ onContinue, onBack }) => {
  const [focused, setFocused] = useState(null);
  const s = D.script;
  const allText = [s.intro, ...s.body.map(b => b.text), s.foodForThought, s.outro].join(" ");
  const wc = allText.split(/\s+/).filter(Boolean).length;
  const target = { min: 580, max: 720 };
  const pct = Math.min(100, (wc / target.max) * 100);
  const inRange = wc >= target.min && wc <= target.max;
  const over = wc > target.max;
  const runtime = (wc / 135).toFixed(2); // ~135 wpm

  const renderText = (txt) => {
    const parts = txt.split(/(\[[^\]]+\]|\*[^*]+\*)/);
    return parts.map((p, i) => {
      if (/^\[.+\]$/.test(p)) return <span key={i} className="tag">{p}</span>;
      if (/^\*.+\*$/.test(p)) return <em key={i}>{p.slice(1, -1)}</em>;
      return <React.Fragment key={i}>{p}</React.Fragment>;
    });
  };

  const section = (key, label, text, citation) => (
    <div className={`script-section ${focused === key ? "focused" : ""}`} onClick={() => setFocused(key)}>
      <div className="label">
        <span>{label}</span>
        {citation && <span className="mono" style={{ padding: "1px 5px", background: "var(--cn-red-50)", color: "var(--cn-red)", borderRadius: 3, fontSize: 9 }}>cites #{citation}</span>}
        <span className="wc" style={{ marginLeft: "auto" }}>{text.split(/\s+/).filter(Boolean).length} words</span>
      </div>
      <div className="content" contentEditable suppressContentEditableWarning>{renderText(text)}</div>
    </div>
  );

  return (
    <div className="stage-body" style={{ overflow: "hidden" }}>
      <div className="script-layout">
        <div className="editor-col">
          <div className="editor-head">
            <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
              <span style={{ fontSize: 14, fontWeight: 600 }}>Script</span>
              <span className="mono" style={{ fontSize: 11, color: "var(--ink-500)" }}>Draft · 1 rewrite</span>
            </div>
            <div style={{ flex: 1 }} />
            <div className="meter">
              <span>WORDS</span>
              <span style={{ color: inRange ? "var(--forest)" : over ? "var(--amber)" : "var(--cn-red)", fontWeight: 600 }}>{wc}</span>
              <span style={{ color: "var(--ink-400)" }}>/ {target.min}–{target.max}</span>
            </div>
            <div className={`meter-bar ${inRange ? "in-range" : over ? "over" : ""}`}>
              <div className="target" style={{ left: `${(target.min / target.max) * 100}%`, right: 0 }} />
              <div className="fill" style={{ width: `${pct}%` }} />
            </div>
            <div className="meter">
              <Icon name="music" size={12}/>
              <span className="mono">~{runtime} min</span>
            </div>
            <div style={{ width: 1, height: 20, background: "var(--border)", margin: "0 6px" }} />
            <button className="btn ghost btn-sm"><Icon name="refresh" size={13}/>Regenerate section</button>
            <button className="btn outlined btn-sm"><Icon name="sparkle" size={13}/>Shorten</button>
          </div>
          <div className="editor-body">
            <div className="editor-content">
              {section("intro", "Intro · fixed", s.intro)}
              {s.body.map((b, i) => section(`body-${i}`, b.label, b.text, b.citation))}
              {section("omt", "One More Thing", s.oneMoreThing)}
              {section("outro", "Outro · fixed", s.outro)}
            </div>
          </div>
        </div>
        <aside className="inspector">
          <div className="inspector-section">
            <h4>Pacing</h4>
            <div className="inspector-row"><span className="k">Total words</span><span className="v">{wc}</span></div>
            <div className="inspector-row"><span className="k">Target range</span><span className="v">{target.min}–{target.max}</span></div>
            <div className="inspector-row"><span className="k">Runtime @ 135 wpm</span><span className="v">~{runtime} min</span></div>
            <div className="inspector-row"><span className="k">Sentences</span><span className="v">{allText.split(/[.!?]+/).length}</span></div>
            <div className="inspector-row"><span className="k">Rewrite attempts</span><span className="v">1</span></div>
          </div>
          <div className="inspector-section">
            <h4>Voice tags in use</h4>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 4 }}>
              {["[pause]", "[soft]", "[emphasis]", "[long pause]"].map(t => (
                <span key={t} className="mono" style={{ fontSize: 11, padding: "2px 6px", background: "var(--ink-100)", borderRadius: 3, color: "var(--ink-700)" }}>{t}</span>
              ))}
            </div>
          </div>
          <div className="inspector-section">
            <h4>Cites these sources</h4>
            {D.selectedIndices.map((idx) => {
              const a = D.articles.find(x => x.idx === idx);
              return (
                <div key={idx} className="source-cite">
                  <span className="idx">{idx}</span>
                  <div>
                    <div className="title">{a.title}</div>
                    <div className="domain">{a.source}</div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="inspector-section">
            <h4>Actions</h4>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <button className="btn outlined btn-sm" style={{ justifyContent: "flex-start" }}><Icon name="refresh" size={13}/>Regenerate entire script</button>
              <button className="btn outlined btn-sm" style={{ justifyContent: "flex-start" }}><Icon name="play" size={13}/>Read aloud preview</button>
              <button className="btn outlined btn-sm" style={{ justifyContent: "flex-start" }}><Icon name="download" size={13}/>Export Markdown</button>
            </div>
          </div>
        </aside>
      </div>
      <FooterActions onBack={onBack} onNext={onContinue} nextLabel="Design cover" hint={`${wc} words · ~${runtime} min`} />
    </div>
  );
};

// ── Stage: Audio ────────────────────────────────────────
const AudioStage = ({ onContinue, onBack }) => {
  const [playing, setPlaying] = useState(false);
  const [t, setT] = useState(0);
  const [provider, setProvider] = useState("qwen");
  const duration = 302;

  useEffect(() => {
    if (!playing) return;
    const i = setInterval(() => setT((v) => (v >= duration ? 0 : v + 1)), 1000);
    return () => clearInterval(i);
  }, [playing]);

  const bars = Array.from({ length: 160 }, (_, i) => {
    const x = i / 160;
    const amp = Math.abs(Math.sin(x * 18) * Math.cos(x * 4)) * 0.7 + Math.random() * 0.2 + 0.1;
    return amp;
  });

  return (
    <div className="stage-body">
      <div className="audio-body">
        <div className="hello-head">
          <div>
            <div style={{ fontSize: 11, letterSpacing: "0.12em", color: "var(--ink-500)", fontWeight: 600, marginBottom: 8 }}>STEP 5 · NARRATE</div>

            <div className="sub">Your voice, cloned. The script above becomes a 5-minute MP3 with proper ID3 tags and cover art embedded.</div>
          </div>
        </div>

        <div className="tts-row">
          {[
            { id: "qwen", name: "Qwen Clone · Jeff", desc: "Your voice clone, Mandarin-capable base. Default. 15s render per minute." },
            { id: "fish", name: "Fish Audio S2", desc: "Alternate provider. Slightly faster but less tonal control." },

          ))}
        </div>

        <div className="waveform">
          <svg viewBox="0 0 160 40" preserveAspectRatio="none">
            {bars.map((h, i) => {

              return (
                <rect
                  key={i}
                  x={i + 0.2}
                  y={20 - h * 18}
                  width="0.6"
                  height={h * 36}

          {" "}and <span className="mono">[soft]</span> are stripped before synthesis.

// ── Tweaks panel ───────────────────────────────────────

  "accent": "#ED0500",
  "paper": "#FDFCF9",
  "font": "Inter Tight"
}/*EDITMODE-END*/;

const TweaksPanel = ({ open, onClose, tweaks, setTweak }) => (
  <div className={`tweaks-panel ${open ? "open" : ""}`}>
    <div className="h">
      <span>Tweaks</span>

      </div>

        <select value={tweaks.paper} onChange={(e) => setTweak("paper", e.target.value)}>

          <option value="#F4F6F8">Cool grey</option>

// ── App root ───────────────────────────────────────────
const App = () => {
  const persistKey = "signal-app-v1";
  const saved = (() => { try { return JSON.parse(localStorage.getItem(persistKey) || "{}"); } catch { return {}; } })();

  const [activeEpId, setActiveEpId] = useState(saved.activeEpId || "ep-24");
  const [stage, setStage] = useState(saved.stage || "articles");
  const [selectedTheme, setSelectedTheme] = useState(saved.selectedTheme ?? 0);
  const [customTheme, setCustomTheme] = useState(saved.customTheme || "");
  const [selectedArticles, setSelectedArticles] = useState(saved.selectedArticles || D.selectedIndices);
  const [detailsOpen, setDetailsOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState({ ...TWEAKS_DEFAULTS, ...(saved.tweaks || {}) });

  useEffect(() => {
    localStorage.setItem(persistKey, JSON.stringify({ activeEpId, stage, selectedTheme, customTheme, selectedArticles, tweaks }));
  }, [activeEpId, stage, selectedTheme, customTheme, selectedArticles, tweaks]);

  // Apply tweaks
  useEffect(() => {
    document.documentElement.style.setProperty("--cn-red", tweaks.accent);
    document.documentElement.style.setProperty("--paper", tweaks.paper);
    document.documentElement.style.setProperty("--font-sans", `"${tweaks.font}", ui-sans-serif, system-ui, sans-serif`);
  }, [tweaks]);

  // Tweaks handshake
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const setTweak = (k, v) => {
    setTweaks((prev) => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
      return next;
    });
  };

  const ep = D.episodes.find(e => e.id === activeEpId) || D.episodes[0];

  const progress = useMemo(() => {
    const order = ["theme", "articles", "script", "cover", "audio", "publish"];
    const i = order.indexOf(stage);
    return Object.fromEntries(order.map((s, idx) => [s, idx < i ? "done" : idx === i ? "current" : "todo"]));
  }, [stage]);

  const go = (s) => setStage(s);
  const next = () => {
    const order = STAGES.map(s => s.id);
    const i = order.indexOf(stage);
    if (i < order.length - 1) setStage(order[i + 1]);
  };
  const back = () => {
    const order = STAGES.map(s => s.id);
    const i = order.indexOf(stage);
    if (i > 0) setStage(order[i - 1]);
  };

  return (
    <div className="app">
      <Topbar episode={ep} onToggleDetails={() => setDetailsOpen(v => !v)} detailsOpen={detailsOpen} />
      <Sidebar episodes={D.episodes} activeId={activeEpId} onSelect={setActiveEpId} />
      <main className="workspace">
        <StageRail current={stage} onGo={go} progress={progress} />
        {stage === "theme" && <ThemeStage chosen={selectedTheme} onChoose={setSelectedTheme} onCustom={setCustomTheme} custom={customTheme} onContinue={next} />}
        {stage === "articles" && <ArticlesStage selected={selectedArticles} setSelected={setSelectedArticles} onContinue={next} onBack={back} />}
        {stage === "script" && <ScriptStage onContinue={next} onBack={back} />}
        {stage === "cover" && <CoverStage ep={ep} onContinue={next} onBack={back} />}
        {stage === "audio" && <AudioStage onContinue={next} onBack={back} />}
        {stage === "publish" && <PublishStage onBack={back} />}
        {detailsOpen && <DetailsDrawer onClose={() => setDetailsOpen(false)} />}
      </main>
      <TweaksPanel open={tweaksOpen} onClose={() => setTweaksOpen(false)} tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
})();</script>
