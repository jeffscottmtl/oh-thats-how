<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Signal</title>
  <link rel="stylesheet" href="/static/style.css?v=13">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">The Signal</div>
      <div class="logo-sub">AI Podcast for Communicators</div>
      <button class="btn btn-primary" style="width:100%; margin-bottom: 16px;" onclick="app.newEpisode()">+ New Episode</button>
      <button class="btn btn-secondary" style="width:100%; margin-bottom: 16px; font-size:12px;" onclick="app.showThemeBank()">Theme Bank</button>
      <input class="sidebar-search" id="ep-search" placeholder="Search episodes..." oninput="app.filterEpisodes()">
      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all" onclick="app.setFilter('all')">All</button>
        <button class="filter-btn" data-filter="draft" onclick="app.setFilter('draft')">Draft</button>
        <button class="filter-btn" data-filter="ready" onclick="app.setFilter('ready')">Ready</button>
        <button class="filter-btn" data-filter="shared" onclick="app.setFilter('shared')">Shared</button>
      </div>
      <ul class="episode-list" id="episode-list"></ul>
    </aside>
    <main class="main" id="main">
      <div class="welcome">
        <h1>The Signal</h1>
        <p>Create podcast episodes for communicators at CN.</p>
        <button class="btn btn-primary" onclick="app.newEpisode()">+ New Episode</button>
      </div>
    </main>
  </div>
  <script src="/static/app.js?v=13"></script>
</body>
</html>
