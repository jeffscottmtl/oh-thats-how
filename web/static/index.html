<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Signal — Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><span></span></div>
        The Signal
      </div>
      <div class="divider"></div>
      <div class="crumbs" id="breadcrumbs">
        <span>Studio</span>
      </div>
      <div class="spacer"></div>
      <div class="right">
        <div class="status-pill draft" id="status-pill">
          <span class="dot"></span>
          <span id="status-label">Draft</span>
        </div>
        <span id="app-version" style="font-size:10px; color:var(--ink-500);"></span>
      </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="label">Episodes</span>
      </div>
      <div class="sidebar-search">
        <input id="ep-search" placeholder="Search episodes..." oninput="app.filterEpisodes()">
      </div>
      <div class="sidebar-tabs" id="sidebar-tabs">
        <button class="sidebar-tab active" data-filter="all" onclick="app.setFilter('all')">All</button>
        <button class="sidebar-tab" data-filter="draft" onclick="app.setFilter('draft')">Drafts</button>
        <button class="sidebar-tab" data-filter="ready" onclick="app.setFilter('ready')">Ready</button>
        <button class="sidebar-tab" data-filter="shared" onclick="app.setFilter('shared')">Published</button>
      </div>
      <div class="episode-list" id="episode-list"></div>
    </aside>

    <!-- Main workspace -->
    <main class="workspace">
      <nav class="stage-rail" id="stage-rail"></nav>
      <div class="stage-body" id="stage-body">
        <div class="panel-pad">
          <div class="welcome">
            <h1>The Signal</h1>
            <p>Create podcast episodes for communicators at CN.</p>
            <button class="btn btn-primary btn-lg" onclick="app.newEpisode()">+ New Episode</button>
            <div style="margin-top:12px">
              <button class="btn btn-secondary" onclick="app.showThemeBank()">Edit Topics</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script>
    // Load version from server, then load app.js with cache-busting
    fetch('/api/version').then(r => r.json()).then(v => {
      document.getElementById('app-version').textContent = v.version;
      const s = document.createElement('script');
      s.src = '/static/app.js?v=' + v.build;
      s.onload = () => app.init();
      document.body.appendChild(s);
      // Also bust CSS cache
      document.querySelector('link[rel="stylesheet"]').href = '/static/style.css?v=' + v.build;
    });
  </script>
</body>
</html>
